<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guesser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        canvas {
            width: 280px;
            height: 280px;
            image-rendering: pixelated;
            border: 2px solid #333;
            background-color: black;
            cursor: crosshair;
        }

        .controls {
            margin-top: 10px;
        }

        button {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
        }

        .main-content {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-top: 20px;
        }

        .canvas-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .thermometer-container {
            display: flex;
            height: 280px;
            padding: 10px 0;
        }

        .labels {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin-right: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #555;
            height: 100%;
        }

        .track {
            position: relative;
            width: 12px;
            background-color: #ddd;
            border-radius: 6px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
            height: 100%;
        }

        #indicator-ball {
            position: absolute;
            left: 50%;
            bottom: 0%;
            transform: translate(-50%, 50%);
            width: 24px;
            height: 24px;
            background-color: #3498db;
            border-radius: 50%;
            transition: bottom 0.3s ease-out;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body>
    <h1>Draw a Digit (0-9)</h1>
    <div class="main-content">
        <div class="canvas-section">
            <canvas id="canvas" width="28" height="28"></canvas>
            <div class="controls">
                <button id="clear-btn">Clear Canvas</button>
            </div>
        </div>

        <div class="thermometer-container">
            <div class="labels">
                <span>9</span>
                <span>8</span>
                <span>7</span>
                <span>6</span>
                <span>5</span>
                <span>4</span>
                <span>3</span>
                <span>2</span>
                <span>1</span>
                <span>0</span>
            </div>
            <div class="track">
                <div id="indicator-ball"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clear-btn');
        const indicatorBall = document.getElementById('indicator-ball');

        // Setup canvas function
        function clearCanvas() {
            ctx.shadowBlur = 0; // Disable shadow for clearing
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Re-enable soft brush settings
            ctx.shadowBlur = 1.0;
            ctx.shadowColor = 'white';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 1.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        clearCanvas();

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Mouse Events
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            lastX = (e.clientX - rect.left) * scaleX;
            lastY = (e.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();

            lastX = x;
            lastY = y;
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseout', () => isDrawing = false);

        // Clear button
        clearBtn.addEventListener('click', () => {
            clearCanvas();
            indicatorBall.style.bottom = '0%';
        });

        // Live Prediction Polling
        setInterval(() => {
            canvas.toBlob((blob) => {
                if (!blob) return;

                const formData = new FormData();
                formData.append('file', blob, 'digit.png');

                fetch('http://localhost:8000/predict/', {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.predicted_number !== undefined) {
                            const pred = data.predicted_number;
                            const percentage = pred * (100 / 9);
                            indicatorBall.style.bottom = `${percentage}%`;
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching prediction:', error);
                    });
            }, 'image/png');
        }, 1000);
    </script>
</body>

</html>
